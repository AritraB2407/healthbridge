spring:
  application:
    name: healthbridge
  datasource:
    url: jdbc:postgresql://localhost:5432/healthbridge?TimeZone=Asia/Kolkata
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080